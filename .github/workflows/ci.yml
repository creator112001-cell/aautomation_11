name: Tests and send log to n8n

on:
  push:
    branches:
      - main
      - "**"
  pull_request:

jobs:
  test-and-send:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest

      - name: Run tests
        id: run_tests
        continue-on-error: true
        run: |
          pytest -q > test_output.txt 2>&1 || echo "tests failed"

      - name: Read test output
        id: read_output
        run: |
          echo "log_message<<EOF" >> $GITHUB_OUTPUT
          cat test_output.txt >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Call n8n webhook
        if: steps.run_tests.outcome == 'failure'
        uses: fjogeleit/http-request-action@v1
        with:
          url: "https://creator112001.app.n8n.cloud/webhook/cloudwatch-logs"
          method: "POST"
          customHeaders: '{"Content-Type": "application/json"}'
          data: >
            {
              "source": "github-actions",
              "repo": "${{ github.repository }}",
              "branch": "${{ github.ref_name }}",
              "commit_sha": "${{ github.sha }}",
              "log_message": "${{ steps.read_output.outputs.log_message }}",
              "file": "app.py",
              "environment": "ci"
            }
